<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Mi Niña Hermosa 🌸</title>
    <style>

        :root {

            --bg-gradient: linear-gradient(135deg, #ffe6ea 0%, #ffd1dc 100%);
            --text-main: #d81b60;
            --text-light: #ad1457;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-shadow: rgba(255, 182, 193, 0.5);
            --petal-color: #ffb7c5;
            --btn-bg: #ff80ab;
            --btn-hover: #ff4081;
        }

        [data-theme="dark"] {

            --bg-gradient: linear-gradient(135deg, #4a0024 0%, #880e4f 100%);
            --text-main: #ff80ab;
            --text-light: #ffb2cb;
            --card-bg: rgba(255, 240, 245, 0.15);
            --card-shadow: rgba(0, 0, 0, 0.3);
            --petal-color: #ff4081;
            --btn-bg: #d81b60;
            --btn-hover: #c2185b;
        }

        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; 
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            transition: background 1s ease, color 1s ease;
            position: relative;
            touch-action: none; 
        }


        .header {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        .header h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            text-shadow: 2px 2px 10px var(--card-shadow);
            margin-bottom: 10px;
            animation: floatText 3s ease-in-out infinite;
        }

        .header p {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-light);
            letter-spacing: 1px;
        }

        @keyframes floatText {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 100;
        }

        .theme-btn {
            background: var(--btn-bg);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-family: 'Quicksand', sans-serif;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px var(--card-shadow);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .theme-btn:hover {
            background: var(--btn-hover);
            transform: scale(1.05);
        }


        #petal-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
        }

        .petal {
            position: absolute;
            background: var(--petal-color);
            border-radius: 15px 0 15px 0; 
            opacity: 0.8;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            animation: fall linear forwards;
        }


        #desk {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        .polaroid {
            position: absolute;
            width: 220px;
            background: var(--card-bg);
            padding: 15px 15px 30px 15px;
            border-radius: 5px;
            box-shadow: 0 10px 25px var(--card-shadow);
            cursor: grab;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .polaroid:active {
            cursor: grabbing;
            transform: scale(1.05) !important;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            z-index: 50 !important;
        }

        .polaroid-img-placeholder {
            width: 100%;
            height: 150px;
            background: rgba(255, 128, 171, 0.2);
            border-radius: 3px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px dashed var(--btn-bg);
        }

        .polaroid-text {
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            color: var(--text-main);
            text-align: center;
            line-height: 1.2;
        }


        .heart-icon {
            width: 40px;
            height: 40px;
            fill: var(--btn-bg);
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }


        @media (max-width: 600px) {
            .header h1 { font-size: 3rem; margin-top: 10px; }
            .polaroid { width: 160px; padding: 10px 10px 20px 10px; }
            .polaroid-img-placeholder { height: 110px; }
            .polaroid-text { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div id="petal-container"></div>

    <div class="header">
        <h1>Simplemente Tú</h1>
        <p>Arrastra las cartitas para leerlas 🌸</p>
    </div>

    <div id="desk">
        </div>

    <div class="controls">
        <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">
            ✨ Cambiar a Atardecer Rosa
        </button>
    </div>

    <script>

        const messages = [
            "Eres el Amor de mi vidaaa.",
            "Eres la persona que yo mas amo en este mundo",
            "Tu voz es la melodía que más me gusta escuchar.",
            "Admiro lo fuerte, inteligente, noble y bondadosa que eres.",
            "Haces que me motive a ser el mejor hombre para tiii",
            "Eres la mejor mujer del mundooo",
            "Te amoooo, eres mi niña hermosaaa",
            "Eres lo mas preciado que tengo, lo mas hermoso que me ha pasado en la vidaaa",
        ];


        const desk = document.getElementById('desk');
        let highestZIndex = 10; 


        const svgHeart = `<svg class="heart-icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;

        function createPolaroids() {
            const screenWidth = window.innerWidth;
            const screenHeight = window.innerHeight;

            messages.forEach((msg, index) => {
                const card = document.createElement('div');
                card.classList.add('polaroid');
                

                const randomRot = Math.floor(Math.random() * 40) - 20; 
                

                const startX = (screenWidth / 2) - 110 + (Math.random() * 100 - 50);
                const startY = (screenHeight / 2) - 100 + (Math.random() * 100 - 50);

                card.style.transform = `translate(${startX}px, ${startY}px) rotate(${randomRot}deg)`;
                card.style.zIndex = index + 1;

                card.innerHTML = `
                    <div class="polaroid-img-placeholder">
                        ${svgHeart}
                    </div>
                    <div class="polaroid-text">${msg}</div>
                `;

                desk.appendChild(card);


                makeDraggable(card);
            });
        }


        function makeDraggable(element) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            let currentRot = 0;

            const transformStyles = element.style.transform;
            if (transformStyles.includes('rotate')) {
                const match = transformStyles.match(/rotate\(([^)]+)deg\)/);
                if (match) currentRot = parseFloat(match[1]);
            }
            element.onmousedown = dragMouseDown;

            element.ontouchstart = dragTouchStart;

            function bringToFront() {
                highestZIndex++;
                element.style.zIndex = highestZIndex;
            }

            function dragMouseDown(e) {
                e.preventDefault();
                bringToFront();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                
                let rect = element.getBoundingClientRect();
                let newTop = element.offsetTop - pos2;
                let newLeft = element.offsetLeft - pos1;


                element.style.transform = `translate(${newLeft}px, ${newTop}px) rotate(${currentRot}deg)`;
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }


            function dragTouchStart(e) {
                bringToFront();
                const touch = e.touches[0];
                pos3 = touch.clientX;
                pos4 = touch.clientY;
                document.ontouchend = closeTouchDragElement;
                document.ontouchmove = elementTouchDrag;
            }

            function elementTouchDrag(e) {
                const touch = e.touches[0];
                pos1 = pos3 - touch.clientX;
                pos2 = pos4 - touch.clientY;
                pos3 = touch.clientX;
                pos4 = touch.clientY;

                let newTop = element.offsetTop - pos2;
                let newLeft = element.offsetLeft - pos1;

                element.style.transform = `translate(${newLeft}px, ${newTop}px) rotate(${currentRot}deg)`;
            }

            function closeTouchDragElement() {
                document.ontouchend = null;
                document.ontouchmove = null;
            }
        }

        const petalContainer = document.getElementById('petal-container');
        const maxPetals = 40; 

        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal');


            const size = Math.random() * 15 + 10; 
            const startPosX = Math.random() * window.innerWidth;
            const duration = Math.random() * 5 + 5; 
            const delay = Math.random() * 5;
            
    
            const swayAmount = Math.random() * 100 - 50; 

            petal.style.width = `${size}px`;
            petal.style.height = `${size}px`;
            petal.style.left = `${startPosX}px`;
            petal.style.top = `-30px`; 

            petal.animate([
                { transform: 'translate3d(0,0,0) rotate(0deg)' },
                { transform: `translate3d(${swayAmount}px, ${window.innerHeight + 50}px, 0) rotate(${Math.random() * 720}deg)` }
            ], {
                duration: duration * 1000,
                delay: delay * 1000,
                easing: 'linear',
                iterations: Infinity 
            });

            petalContainer.appendChild(petal);
        }


        for (let i = 0; i < maxPetals; i++) {
            createPetal();
        }


        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');

            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                btn.innerHTML = '✨ Cambiar a Atardecer Rosa';
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.innerHTML = '🌸 Volver a Mañana Pastel';
            }
        }


        window.onload = () => {
            createPolaroids();
        };


        window.onresize = () => {
            desk.innerHTML = ''; 
            createPolaroids(); 
        };

    </script>
</body>
</html>
